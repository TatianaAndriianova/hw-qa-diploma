version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: diploma-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: pass
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    container_name: diploma-postgres
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gate-simulator:
    image: node:18-alpine
    container_name: diploma-gate
    working_dir: /app
    volumes:
      - ./gate-simulator:/app
    command: sh -c "npm install && npm start"
    ports:
      - "9999:9999"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- --post-data='{\"number\":\"4444 4444 4444 4441\"}' --header='Content-Type:application/json' http://localhost:9999/payment && exit 0 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  shop-mysql:
    build: .
    container_name: diploma-shop-mysql
    environment:
      SPRING_CREDIT-GATE_URL: http://gate-simulator:9999/credit
      SPRING_PAYMENT-GATE_URL: http://gate-simulator:9999/payment
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/app
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: pass
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      gate-simulator:
        condition: service_healthy
    profiles:
      - mysql

  shop-postgres:
    build: .
    container_name: diploma-shop-postgres
    environment:
      SPRING_CREDIT-GATE_URL: http://gate-simulator:9999/credit
      SPRING_PAYMENT-GATE_URL: http://gate-simulator:9999/payment
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/app
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: pass
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      gate-simulator:
        condition: service_healthy
    profiles:
      - postgres